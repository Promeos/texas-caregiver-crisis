regulatory:
  - name: "1 TAC §355.7052 — Attendant Cost Determination (Adopted Rule, Sept 2025)"
    url: "https://www.sos.state.tx.us/texreg/archive/September52025/Adopted%20Rules/1.ADMINISTRATION.html"
    pdf_url: "https://www.sos.state.tx.us/texreg/pdf/backview/0905/0905adop.pdf"
    type: adopted_rule
    accessed: "2026-03-16"
    effective_date: "2025-09-01"
    published_date: "2025-09-05"
    register_volume: 50
    register_number: 36
    description: "New rule governing attendant cost component for all LTSS programs; encodes $13/hr wage and 14%/15% payroll ratios per GAA Rider 23"
    notes: >
      HHSC declined commenter request to use BLS wage data or State Supported Living Center wages.
      Stated preference for cost-report-based methodology. 21 comments received from 20 organizations
      during comment period ending August 1, 2025. Statutory authority cites both SB 457 and GAA Rider 23.

